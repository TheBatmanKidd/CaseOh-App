name: CaseOh App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) {
            pip install -r requirements.txt
        }

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "CaseOh App" --collect-all OpenGL --add-data "caseoh.png;." --add-data "strawberry-cheesecake.mp3;." caseohapp.py

    - name: Upload Finished EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CaseOhApp-Windows-Build
        path: dist/CaseOh App.exe
